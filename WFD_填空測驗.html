const CATKEYS = ['A','B','C','D','E'];
const BADGE = {A:'ba',B:'bb',C:'bc',D:'bd',E:'be'};
const SKEY = 'wfd_decisions_v1';
const MKEY = 'wfd_answer_mode';
let catFilter = 'ALL';
let view = 'all';                 // all | todo | keep | drop
let decisions = load();           // { num: 'keep' | 'drop' }
let typed = {};                   // { 'num_idx': value } — keep answers across re-render
let ansMode = localStorage.getItem(MKEY) !== '0';   // default ON (answers shown)

function load(){ try{ return JSON.parse(localStorage.getItem(SKEY))||{}; }catch(e){ return {}; } }
function save(){ localStorage.setItem(SKEY, JSON.stringify(decisions)); }
const norm = s => s.toLowerCase().replace(/[^a-z]/g,'');
function escapeHtml(s){ return s.replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function counts(){
  const c = {ALL:DB.items.length, keep:0, drop:0, todo:0};
  CATKEYS.forEach(k=> c[k]=DB.items.filter(i=>i.cat===k).length);
  DB.items.forEach(i=>{ const d=decisions[i.num]; if(d==='keep')c.keep++; else if(d==='drop')c.drop++; else c.todo++; });
  return c;
}

function buildPills(){
  const c = counts();
  const p = document.getElementById('pills');
  const mk=(k,l)=>`<div class="pill ${catFilter===k?'active':''}" data-k="${k}">${l}<span class="n">${c[k]}</span></div>`;
  let h = mk('ALL','全部');
  CATKEYS.forEach(k=> h+=mk(k, DB.cats[k]));
  p.innerHTML = h;
  p.querySelectorAll('.pill').forEach(el=> el.onclick=()=>{ catFilter=el.dataset.k; render(); });

  const v = document.getElementById('views');
  const mv=(k,l,cls)=>`<div class="pill ${cls} ${view===k?'active':''}" data-v="${k}">${l}<span class="n">${k==='all'?c.ALL:c[k]}</span></div>`;
  v.innerHTML = mv('all','全部','') + mv('todo','待篩選','vt') + mv('keep','✅保留','vk') + mv('drop','✕略過','vd');
  v.querySelectorAll('.pill').forEach(el=> el.onclick=()=>{ view=el.dataset.v; render(); });
}

function matchView(i){
  const d = decisions[i.num];
  if(view==='all') return true;
  if(view==='todo') return !d;
  return d===view;
}

function cardHTML(it){
  let inner='', bi=0;
  it.segs.forEach(sg=>{
    if(sg.t==='text') inner += escapeHtml(sg.v);
    else if(ansMode) { inner += `<span class="fill">${escapeHtml(sg.v)}</span>`; bi++; }
    else { const v=typed[it.num+'_'+bi]||''; inner += `<input data-i="${bi}" value="${escapeHtml(v)}" autocomplete="off" autocapitalize="off" spellcheck="false" size="${Math.max(8,sg.v.length+2)}">`; bi++; }
  });
  const ans = it.ans.map(a=>`<b>${escapeHtml(a)}</b>`).join('　');
  const dec = decisions[it.num]||'';
  return `<div class="card ${dec}" data-num="${it.num}" data-cat="${it.cat}">
    <div class="card-head">
      <span class="num">#${it.num}</span>
      <span class="badge ${BADGE[it.cat]}">${DB.cats[it.cat]}</span>
      <span class="zh">${escapeHtml(it.zh)}</span>
    </div>
    <div class="sent">${inner}</div>
    <div class="row2">
      <button class="deci k">✅ 保留</button>
      <button class="deci d">✕ 略過</button>
      <span class="mini reveal quizonly">顯示答案</span>
    </div>
    <div class="ansline quizonly">答案：${ans}</div>
  </div>`;
}

function render(){
  const list = document.getElementById('list');
  let items = DB.items.filter(i=> (catFilter==='ALL'||i.cat===catFilter) && matchView(i));
  items.sort((a,b)=> CATKEYS.indexOf(a.cat)-CATKEYS.indexOf(b.cat) || a.num-b.num);

  const empty = document.getElementById('empty');
  if(!items.length){ list.innerHTML=''; empty.style.display='block';
    empty.textContent = view==='todo' ? '🎉 這個分類都篩完了！' : '沒有符合的題目'; }
  else empty.style.display='none';

  // group headers by category (only when showing all categories)
  let html='', lastCat=null;
  const cmap={};
  items.forEach(i=>{ cmap[i.cat]=(cmap[i.cat]||0)+1; });
  items.forEach(it=>{
    if(catFilter==='ALL' && it.cat!==lastCat){
      lastCat=it.cat;
      html += `<div class="ghead"><span class="badge ${BADGE[it.cat]}">${DB.cats[it.cat]}</span><span class="gn">${cmap[it.cat]} 題</span></div>`;
    }
    html += cardHTML(it);
  });
  list.innerHTML = html;

  list.querySelectorAll('.card').forEach(card=>{
    const num = +card.dataset.num;
    const it = DB.items.find(i=>i.num===num);
    const ins = card.querySelectorAll('input');
    ins.forEach((inp,idx)=>{
      inp.addEventListener('input', ()=>{ inp.classList.remove('ok','bad'); typed[num+'_'+idx]=inp.value; });
      inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault();
        if(idx<ins.length-1) ins[idx+1].focus(); else checkCard(card); } });
    });
    card.querySelector('.reveal').onclick = ()=> revealCard(card);
    card.querySelector('.deci.k').onclick = ()=> decide(num,'keep',card);
    card.querySelector('.deci.d').onclick = ()=> decide(num,'drop',card);
  });
  buildPills();
  updateScore();
}

function decide(num, val, card){
  decisions[num] = (decisions[num]===val) ? undefined : val;
  if(decisions[num]===undefined) delete decisions[num];
  save();
  // if current view would now hide this card, drop it out smoothly; else just restyle
  const it = DB.items.find(i=>i.num===num);
  if(!matchView(it)){ card.style.transition='.18s'; card.style.opacity='0'; card.style.height=card.offsetHeight+'px';
    setTimeout(render, 160); }
  else { card.classList.remove('keep','drop'); if(decisions[num]) card.classList.add(decisions[num]); buildPills(); }
}

function checkCard(card){
  const it = DB.items.find(i=>i.num==card.dataset.num);
  card.querySelectorAll('input').forEach((inp,idx)=>{
    const ok = norm(inp.value)===norm(it.ans[idx]) && inp.value.trim()!=='';
    inp.classList.toggle('ok',ok); inp.classList.toggle('bad',!ok);
  });
  card.querySelector('.ansline').classList.add('show'); updateScore();
}
function revealCard(card){
  const it = DB.items.find(i=>i.num==card.dataset.num);
  card.querySelectorAll('input').forEach((inp,idx)=>{ inp.value=it.ans[idx]; typed[card.dataset.num+'_'+idx]=it.ans[idx]; inp.classList.add('ok'); inp.classList.remove('bad'); });
  card.querySelector('.ansline').classList.add('show'); updateScore();
}
function updateScore(){
  let ok=0,bad=0,total=0;
  document.querySelectorAll('.card input').forEach(i=>{ total++;
    if(i.classList.contains('ok'))ok++; else if(i.classList.contains('bad'))bad++; });
  document.getElementById('score').innerHTML =
    `<span class="ok">✓ ${ok}</span> &nbsp; <span class="bad">✗ ${bad}</span> &nbsp; / ${total} 格`;
}

document.getElementById('checkAll').onclick=()=> document.querySelectorAll('.card').forEach(checkCard);
document.getElementById('revealAll').onclick=()=> document.querySelectorAll('.card').forEach(revealCard);
document.getElementById('clearAll').onclick=()=>{ typed={};
  document.querySelectorAll('.card input').forEach(i=>{ i.value=''; i.classList.remove('ok','bad'); });
  document.querySelectorAll('.ansline').forEach(a=>a.classList.remove('show')); updateScore(); };
document.getElementById('copyKeep').onclick=()=>{
  const kept = DB.items.filter(i=>decisions[i.num]==='keep').sort((a,b)=>CATKEYS.indexOf(a.cat)-CATKEYS.indexOf(b.cat)||a.num-b.num);
  if(!kept.length){ alert('還沒有保留任何題目'); return; }
  const txt = kept.map(i=>`[${DB.cats[i.cat]}] #${i.num} ${i.en}`).join('\n');
  navigator.clipboard.writeText(txt).then(()=> alert('已複製 '+kept.length+' 題保留清單到剪貼簿'),
    ()=> alert('複製失敗，請手動選取'));
};

function applyAnsMode(){
  document.body.classList.toggle('ansmode', ansMode);
  const b=document.getElementById('ansMode');
  b.textContent = ansMode ? '📖 答案模式：開' : '✏️ 答案模式：關';
  b.classList.toggle('off', !ansMode);
}
document.getElementById('ansMode').onclick=()=>{
  ansMode=!ansMode; localStorage.setItem(MKEY, ansMode?'1':'0');
  applyAnsMode(); render();
};

applyAnsMode(); buildPills(); render();
</script>
</body>
</html>
