<title>WFD 易錯單字庫</title>
<style>
  :root{--ink:#1a1a1a;--muted:#6b6b6b;--line:#e3e0d8;--bg:#faf9f6;--card:#fff;
    --accent:#185fa5;--accentbg:#e6f1fb;--ok:#3b6d11;--okbg:#eaf3de;--warn:#a32d2d;--warnbg:#fcebeb;--tag:#5f5e5a;--tagbg:#f1efe8}
  *{box-sizing:border-box}body{margin:0}
  .wrap{max-width:780px;margin:0 auto;padding:2rem 1.1rem 4rem;
    font-family:-apple-system,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;color:var(--ink);line-height:1.6;background:var(--bg)}
  h1{font-size:1.55rem;font-weight:600;margin:0 0 .2rem}
  .sub{color:var(--muted);font-size:.9rem;margin:0 0 1.5rem}
  .bar{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;margin-bottom:1.4rem}
  button{font-family:inherit;font-size:.9rem;padding:.45rem .9rem;border:1px solid var(--line);background:var(--card);border-radius:8px;cursor:pointer}
  button:hover{border-color:var(--accent);color:var(--accent)}
  .count{margin-left:auto;color:var(--muted);font-size:.9rem}
  .item{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:.9rem 1.1rem;margin-bottom:.8rem}
  .top{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem}
  .zh{font-size:1.05rem;font-weight:600}
  .tag{font-size:.7rem;color:var(--tag);background:var(--tagbg);border-radius:5px;padding:.1em .5em}
  .src{font-size:.85rem;color:var(--muted);margin:.1rem 0 .55rem}
  .src .blk{display:inline-block;min-width:60px;border-bottom:2px solid var(--accent);margin:0 2px}
  input{font-family:inherit;font-size:1rem;padding:.4rem .6rem;border:1px solid var(--line);border-radius:7px;width:240px;max-width:60%}
  input.ok{border-color:var(--ok);background:var(--okbg)}
  input.bad{border-color:var(--warn);background:var(--warnbg)}
  .chk{margin-left:.4rem}
  .trap{font-size:.85rem;color:var(--warn);background:var(--warnbg);border-radius:7px;padding:.4rem .65rem;margin-top:.55rem;display:none}
  .ans{font-size:.95rem;margin-top:.5rem;display:none}
  .ans b{color:var(--ok);font-size:1.05rem;letter-spacing:.02em}
  .add{background:var(--accentbg);border:1px dashed var(--accent);border-radius:11px;padding:.9rem 1.1rem;color:var(--accent);font-size:.88rem;margin-top:1rem}
</style>

<div class="wrap">
  <h1>WFD 易錯單字庫</h1>
  <p class="sub">James 專用拼字庫 · 看中文＋句子默拼，按「對答案」檢查 · 可持續累積</p>

  <div class="bar">
    <button id="hint">顯示陷阱提示</button>
    <button id="reveal">全部解答</button>
    <button id="reset">清空重練</button>
    <span class="count" id="count"></span>
  </div>

  <div id="list"></div>

  <div class="add"><b>要加新字？</b> 練 WFD 時把沒把握的字貼給我，我會補進這個檔（每個字附中文＋拼錯陷阱＋來源句）。</div>
</div>

<script>
const DATA=[
  {w:'tutorials',zh:'輔導課 / 個別教學',tag:'WFD',trap:'tu·tor·i·als — 字尾 -ials，別漏中間的 i；單數 tutorial 加 s',src:'____ are scheduled in the final week of the term.'},
  {w:'scheduled',zh:'排定、安排（被動）',tag:'WFD',trap:'sch- 開頭有 h（不是 sk-）；字尾 = schedule + d',src:'Tutorials are ____ in the final week of the term.'},
  {w:'toughest',zh:'最艱難的',tag:'WFD',trap:'tough = t·o·u·g·h（gh 不發音）；最高級 tough + est。別多一個 t（不是 toughtest），別漏 h（不是 tougest）',src:'The ____ part of postgraduate education is funding.'},
  {w:'inadequately',zh:'不足地、不充分地',tag:'WFD',trap:'in + adequate + ly。adequate = a·de·quate（有 qu）；-ly 前保留 e → adequately（別拼 inadaquately / inadequatly）',src:'...the educational reforms have been ____ implemented'},
  {w:'implemented',zh:'實施、執行（被動）',tag:'WFD',trap:'im·ple·ment·ed — 中段是 ple（e 不是 i，別拼成 implimented）；+ ed',src:'...the educational reforms have been inadequately ____'},
  {w:'scientists',zh:'科學家（複數）',tag:'WFD',trap:'sci·en·tists — sc 開頭（c 不發音）；字尾 -tists = tist + s，別漏中間的 t（不是 scientits / sciencists）',src:'Most ____ believe that climate change threatens the lives on earth.'},
  {w:'captivity',zh:'圈養、囚禁',tag:'WFD',trap:'captive 去 e + ity → cap·tiv·i·ty；字尾 -ity（不是 -ety，別拼 captivety）',src:'Animals raised in ____ behave differently than their wild counterparts.'},
  {w:'counterparts',zh:'對應的人/物（複數）',tag:'WFD',trap:'counter（有 ou，同「櫃台/相反」字根）+ parts；別漏 ou、別拼成 counterpards',src:'Animals raised in captivity behave differently than their wild ____.'},
  {w:'principles',zh:'原則（複數）',tag:'WFD',trap:'prin·ci·ples（-ci- 發 s 音）；principle（原則，-le）≠ principal（校長/主要，-pal）；+ s',src:'certain scientific ____ must be learned verbally or by logical deduction.'},
  {w:'verbally',zh:'口頭地、用言語地',tag:'WFD',trap:'verbal + ly → 兩個 l（verbally），別只寫一個 l',src:'certain scientific principles must be learned ____ or by logical deduction.'},
  {w:'deduction',zh:'推論、演繹',tag:'WFD',trap:'deduce → de·duc·tion；-ction 結尾（別漏 c：不是 deduion）',src:'...must be learned verbally or by logical ____.'},
  {w:'examined',zh:'檢視、審查（被動）',tag:'WFD',trap:'examine + d → e·xam·ined；保留 e 後加 d，別漏 i（不是 examind / examed）',src:'the economic status of the early Roman republic will be ____.'},
  {w:'failure',zh:'失敗',tag:'WFD',trap:'fail + ure → fail·ure；字尾 -ure（不是 -er，別拼 failer / failiure）',src:'organizational ____ is considered from various perspectives in academic literature.'},
  {w:'various',zh:'各種的',tag:'WFD',trap:'var·i·ous；字尾 -ious，別漏 i（不是 varous / variuos）',src:'...is considered from ____ perspectives in academic literature.'},
  {w:'perspectives',zh:'觀點（複數）',tag:'WFD',trap:'per·spec·tives — per（不是 pro！）+ spec + tives；別漏中間的 s',src:'...is considered from various ____ in academic literature.'},
  {w:'literature',zh:'文獻、文學',tag:'WFD',trap:'lit·er·a·ture — e/a/u 三個母音都要（別拼 litrature）；字尾 -ture',src:'...from various perspectives in academic ____.'},
  {w:'participants',zh:'參與者（複數）',tag:'WFD',trap:'par·ti·ci·pants — ti-ci 中間別漏 i（不是 particpants / participents）；+ s',src:'____ initially select from a range of foundation subjects.'},
  {w:'initially',zh:'起初、最初',tag:'WFD',trap:'initial + ly → 兩個 l（initially）；in·i·tial 別漏第二個 i（不是 intially / initialy）',src:'Participants ____ select from a range of foundation subjects.'},
  {w:'foundation',zh:'基礎、地基',tag:'WFD',trap:'found（有 ou）+ ation → foun·da·tion；別漏 ou（不是 fondation）',src:'Participants initially select from a range of ____ subjects.'},
  {w:'stewardship',zh:'管理職、管家職責',tag:'WFD',trap:'steward（stew + ard）+ ship → stew·ard·ship；別拼 stewartship',src:'...the prestigious election of ____ has strict eligibility criteria.'},
  {w:'strict',zh:'嚴格的',tag:'WFD',trap:'str·ict — 字尾 -ct，別漏 c（不是 strit）、別寫 strick',src:'...has ____ eligibility criteria.'},
  {w:'eligibility',zh:'資格、合格',tag:'WFD',trap:'eligible → e·li·gi·bil·i·ty 幾乎全是 i（別寫 elegibility / eligability）；g 發 j 音',src:'...has strict ____ criteria.'},
  {w:'criteria',zh:'標準（複數，單數 criterion）',tag:'WFD',trap:'cri·te·ri·a — 字尾 -ria；本身已是複數，別加 s（單數才是 criterion）',src:'...has strict eligibility ____.'},
  {w:'circumstances',zh:'情況、環境（複數）',tag:'WFD',trap:'circum（circ + um，不是 -om-）+ stances → cir·cum·stances；字尾 -stances 用 c（不是 -stanses）',src:'statistical results should be expressed in different ways depending on the ____.'},
  {w:'mechanics',zh:'力學、機械學',tag:'WFD',trap:'me·chan·ics — ch 發 k 音，別漏 h（不是 mecanics）；mech 是 e（不是 machanics）',src:'classical ____ is sometimes considered as a branch of applied mathematics.'},
  {w:'applied',zh:'應用的',tag:'WFD',trap:'apply → applied（y 變 ied）；兩個 p（別寫 aplied / applyed）',src:'...considered as a branch of ____ mathematics.'},
  {w:'mathematics',zh:'數學',tag:'WFD',trap:'ma·the·ma·tics — 中間有 e 別漏（不是 mathmatics）；字尾 -ics 別漏 s',src:'...as a branch of applied ____.'},
  {w:'further',zh:'進一步、更遠',tag:'WE罩門·漏r',trap:'fur·ther — 漏子音前的 r（你曾拼 futher / furthur）',src:'and will discuss this ____ below'},
  {w:'large',zh:'大的',tag:'WE罩門·漏r',trap:'lar·ge — 別漏 r（曾拼 lage）',src:'WE 練習'},
  {w:'despite',zh:'儘管',tag:'WE罩門',trap:'de·spite — 不是 dispect！這個你連錯多次',src:'In conclusion, ____ the fact...'},
  {w:'convenient',zh:'方便的',tag:'WE罩門',trap:'con·ven·ient（曾拼 convinent）',src:'WE 練習'},
  {w:'especially',zh:'尤其',tag:'WE罩門',trap:'e·spe·cial·ly（曾拼 espacially）',src:'WE 練習'},
  {w:'simultaneously',zh:'同時地',tag:'WE罩門',trap:'si·mul·ta·neous·ly（曾拼 simotaniously）',src:'WE 練習'},
  {w:'evolving',zh:'演進中',tag:'WE罩門·去e',trap:'evolve → evolv + ing，去 e（曾拼 evoloing）',src:'WE 練習'},
  {w:'irreplaceable',zh:'無可取代的',tag:'WE罩門',trap:'ir·replace·able（曾拼 unreplaceble）',src:'WE 練習'},
  {w:'renowned',zh:'著名的',tag:'WE罩門',trap:'re·nowned（曾拼 renowing）；模板 world-renowned',src:'who works at a world-____ and prestigious firm'},
  {w:'people',zh:'人們',tag:'WE罩門·顛倒',trap:'peo·ple — 字母別顛倒（曾拼 poeple / peopel）',src:'WE 練習'},
  {w:'digital',zh:'數位的',tag:'WE罩門',trap:'di·gi·tal（曾拼 digitial）',src:'WE 練習'},
  {w:'upgrading',zh:'升級',tag:'WE罩門·顛倒',trap:'up·grad·ing — a/r 別顛倒（曾拼 upgarding）',src:'WE 練習'},
  {w:'materials',zh:'材料',tag:'WE罩門',trap:'ma·te·ri·als（曾拼 materilas）',src:'WE 練習'},
  {w:'remotely',zh:'遠端地',tag:'WE罩門',trap:'remote + ly（曾拼 remotly）',src:'WE 練習'},
  {w:'groceries',zh:'食品雜貨',tag:'WE罩門',trap:'gro·cer·ies（曾拼 grossary）',src:'WE 練習'},
  {w:'surfing',zh:'瀏覽、衝浪',tag:'WE罩門',trap:'單 f：surf + ing（曾拼 surffing）',src:'WE 練習'}
];

const list=document.getElementById('list');
DATA.forEach((d,i)=>{
  const el=document.createElement('div');el.className='item';
  el.innerHTML=
    '<div class="top"><span class="zh">'+d.zh+'</span><span class="tag">'+d.tag+'</span></div>'+
    '<p class="src">'+d.src.replace('____','<span class="blk"></span>')+'</p>'+
    '<input id="in'+i+'" autocomplete="off" spellcheck="false" placeholder="拼拼看…">'+
    '<button class="chk" data-i="'+i+'">對答案</button>'+
    '<p class="trap" id="tp'+i+'"><i>陷阱：</i>'+d.trap+'</p>'+
    '<p class="ans" id="an'+i+'"></p>';
  list.appendChild(el);
});

function check(i){
  const inp=document.getElementById('in'+i);
  const ans=document.getElementById('an'+i);
  const correct=inp.value.trim().toLowerCase()===DATA[i].w.toLowerCase();
  inp.classList.remove('ok','bad');
  inp.classList.add(correct?'ok':'bad');
  ans.style.display='block';
  ans.innerHTML=correct?'<span style="color:var(--ok)">✓ 正確</span>':'正解：<b>'+DATA[i].w+'</b>';
  document.getElementById('tp'+i).style.display='block';
  updateCount();
}
function updateCount(){
  let ok=0,done=0;
  DATA.forEach((d,i)=>{const v=document.getElementById('in'+i).value.trim();if(v){done++;if(v.toLowerCase()===d.w.toLowerCase())ok++;}});
  document.getElementById('count').textContent=done?('已測 '+done+'/'+DATA.length+' · 對 '+ok):('共 '+DATA.length+' 字');
}
document.querySelectorAll('.chk').forEach(b=>b.onclick=()=>check(+b.dataset.i));
document.getElementById('hint').onclick=()=>document.querySelectorAll('.trap').forEach(t=>t.style.display=t.style.display==='block'?'none':'block');
document.getElementById('reveal').onclick=()=>DATA.forEach((d,i)=>{document.getElementById('in'+i).value=d.w;check(i);});
document.getElementById('reset').onclick=()=>DATA.forEach((d,i)=>{const inp=document.getElementById('in'+i);inp.value='';inp.classList.remove('ok','bad');document.getElementById('an'+i).style.display='none';document.getElementById('tp'+i).style.display='none';updateCount();});
updateCount();
</script>
