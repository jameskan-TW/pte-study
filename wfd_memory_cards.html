<style>
  :root {

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding: 24px 16px 60px; }
  header { text-align: center; margin-bottom: 32px; }
  header h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
  header p { color: var(--muted); font-size: 0.88rem; }
  .progress-bar { width: 100%; max-width: 680px; margin: 0 auto 28px; background: var(--border); border-radius: 99px; height: 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.4s ease; }
  .nav-bar { display: flex; justify-content: center; align-items: center; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
  .nav-btn { background: #1a1d27; border: 1px solid var(--border); color: var(--text); padding: 8px 22px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; transition: all 0.2s; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .counter { font-size: 1rem; color: var(--muted); min-width: 60px; text-align: center; }
  .card-scene { width: 100%; max-width: 680px; margin: 0 auto; height: 400px; perspective: 1200px; cursor: pointer; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); }
  .card-scene.flipped .card-inner { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; border-radius: 20px; border: 1px solid var(--border); backface-visibility: hidden; -webkit-backface-visibility: hidden; padding: 24px 28px; display: flex; flex-direction: column; }
  .card-front { background: var(--card-front); }
  .card-back  { background: var(--card-back); transform: rotateY(180deg); }
  .card-num { font-size: 0.75rem; color: var(--muted); margin-bottom: 16px; letter-spacing: 0.05em; }
  .icon-chain { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 6px; flex: 1; }
  .icon-item { display: flex; flex-direction: column; align-items: center; gap: 3px; background: rgba(255,255,255,0.05); border-radius: 14px; padding: 10px 12px; min-width: 78px; }
  .icon-item .ico { font-size: 2rem; line-height: 1; }
  .icon-item .eng { font-size: 0.76rem; font-weight: 600; color: #e2e8f0; text-align: center; line-height: 1.2; max-width: 78px; font-family: 'Consolas','Courier New',monospace; }
  .icon-item .pos { font-size: 0.6rem; color: var(--accent); text-align: center; background: rgba(79,156,249,0.12); border-radius: 4px; padding: 1px 5px; }
  .icon-item .lbl { font-size: 0.66rem; color: var(--muted); text-align: center; line-height: 1.3; max-width: 78px; }
  .chain-arrow { font-size: 1.2rem; color: var(--border); padding: 0 2px; align-self: center; }
  .flip-hint { text-align: center; color: var(--muted); font-size: 0.76rem; margin-top: 14px; }
  .en-sentence { font-size: 1.1rem; font-weight: 600; line-height: 1.65; margin-bottom: 12px; color: #fff; }
  .en-sentence .hl { color: var(--yellow); }
  .zh-sentence { font-size: 0.92rem; color: var(--muted); margin-bottom: 18px; line-height: 1.6; }
  .prompt-box { background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.2); border-radius: 10px; padding: 12px 14px; margin-top: auto; }
  .prompt-label { font-size: 0.7rem; color: var(--accent2); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; }
  .prompt-text { font-size: 0.78rem; color: #c4b5fd; line-height: 1.55; font-style: italic; }
  .copy-btn { margin-top: 8px; background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3); color: var(--accent2); border-radius: 6px; padding: 4px 12px; font-size: 0.73rem; cursor: pointer; transition: all 0.2s; }
  .copy-btn:hover { background: rgba(167,139,250,0.3); }
  .dots { display: flex; justify-content: center; gap: 6px; margin-top: 22px; flex-wrap: wrap; max-width: 680px; margin-left: auto; margin-right: auto; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); cursor: pointer; transition: all 0.2s; }
  .dot.active { background: var(--accent); transform: scale(1.35); }
  .dot.seen   { background: var(--accent2); opacity: 0.5; }
  @media (max-width: 500px) {
    .card-scene { height: 440px; }
    .card-face { padding: 18px 14px; }
    .icon-item { min-width: 64px; padding: 8px 8px; }
    .icon-item .ico { font-size: 1.8rem; }

</style>

    icons:[C("💻","website","n.","網站"), C("🔍","find","v.","可以找到"), C("📋","complex","adj.","複雜表單")],
    hl:["complex form","website"], prompt:"A person navigating a laptop, finally locating a complex multi-page form buried in the menu. A helpful arrow points to it. Digital bureaucracy navigation." }
];

let current = 0;
const seen = new Set();

function buildFront(c) {
  const items = c.icons.map(i => {
    if (i.lbl === "") return `<span class="chain-arrow">${i.ico}</span>`;
    const engLine = i.eng ? `<span class="eng">${i.eng}</span>` : '';
    const posLine = i.pos ? `<span class="pos">${i.pos}</span>` : '';
    return `<div class="icon-item"><span class="ico">${i.ico}</span>${engLine}${posLine}<span class="lbl">${i.lbl}</span></div>`;
  }).join('');
  return `
    <div class="card-num"># ${c.num} / ${cards.length}</div>
    <div class="icon-chain">${items}</div>
    <div class="flip-hint">點擊翻面查看英文原句 →</div>
  `;
}

function buildBack(c) {
  let hl = c.en;
  c.hl.forEach(h => {
    hl = hl.replace(new RegExp(h.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'),
      m => `<span class="hl">${m}</span>`);
  });
  return `
    <div class="card-num"># ${c.num} — 點擊翻回圖示</div>
    <div class="en-sentence">${hl}</div>
    <div class="zh-sentence">${c.zh}</div>
    <div class="prompt-box">
      <div class="prompt-label">🎨 AI 繪圖 Prompt</div>
      <div class="prompt-text" id="pt${c.num}">${c.prompt}</div>
      <button class="copy-btn" onclick="copyP(event,${c.num})">複製 Prompt</button>
    </div>
  `;
}

function render() {
  const c = cards[current];
  document.getElementById('cardFront').innerHTML = buildFront(c);
  document.getElementById('cardBack').innerHTML  = buildBack(c);
  document.getElementById('counter').textContent = `${current+1} / ${cards.length}`;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === cards.length - 1;
  document.getElementById('progressFill').style.width = `${(seen.size/cards.length)*100}%`;
  renderDots();
}

function renderDots() {
  const el = document.getElementById('dots');
  el.innerHTML = '';
  cards.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i===current?' active': seen.has(i)?' seen':'');
    d.onclick = () => goTo(i);
    el.appendChild(d);
  });
}

function flipCard() {
  const scene = document.getElementById('cardScene');
  const flipped = scene.classList.toggle('flipped');
  if (flipped) { seen.add(current); renderDots(); document.getElementById('progressFill').style.width=`${(seen.size/cards.length)*100}%`; }
}

function navigate(dir) {
  current = Math.max(0, Math.min(cards.length-1, current+dir));
  document.getElementById('cardScene').classList.remove('flipped');
  render();
}

function goTo(i) { current=i; document.getElementById('cardScene').classList.remove('flipped'); render(); }

function copyP(e, num) {
  e.stopPropagation();
  navigator.clipboard.writeText(document.getElementById('pt'+num).textContent).then(() => {
    e.target.textContent = '已複製 ✓';
    setTimeout(() => e.target.textContent = '複製 Prompt', 2000);
  });
}

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') navigate(1);
  else if (e.key==='ArrowLeft'||e.key==='ArrowUp') navigate(-1);
  else if (e.key===' '||e.key==='Enter') { e.preventDefault(); flipCard(); }
});

render();
</script>
</body>
</html>
